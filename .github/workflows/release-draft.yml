name: Draft Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to draft, for example v0.20.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  draft-release:
    name: Draft GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Determine tag
        id: determine_tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${tag}' does not match expected vX.Y.Z format." >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "Using tag ${tag}"

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check out tagged commit
        shell: bash
        env:
          TAG: ${{ steps.determine_tag.outputs.tag }}
        run: |
          set -euo pipefail

          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          git checkout --detach "${TAG}"

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          TAG: ${{ steps.determine_tag.outputs.tag }}
        run: |
          set -euo pipefail

          tag="${TAG}"
          version="${tag#v}"
          notes_file="docs/releases/${tag}.md"
          package_version="$(node -p "require('./package.json').version")"

          if [[ "${package_version}" != "${version}" ]]; then
            echo "package.json version '${package_version}' does not match tag '${tag}'." >&2
            exit 1
          fi

          if [[ ! -f "${notes_file}" ]]; then
            echo "Missing release notes file: ${notes_file}" >&2
            exit 1
          fi

          if [[ ! -f CHANGELOG.md ]]; then
            echo "Missing CHANGELOG.md." >&2
            exit 1
          fi

          if ! grep -Fq "## [${version}] -" CHANGELOG.md; then
            echo "CHANGELOG.md is missing required dated section: ## [${version}] - YYYY-MM-DD" >&2
            exit 1
          fi

          expected_title="# TypeScript WSDL Client ${tag}"
          first_line="$(sed -n '1p' "${notes_file}")"
          if [[ "${first_line}" != "${expected_title}" ]]; then
            echo "Release notes first line must be exactly: ${expected_title}" >&2
            exit 1
          fi

          improves_line="$(grep -n -m 1 '^## What This Improves$' "${notes_file}" | cut -d: -f1 || true)"
          if [[ -z "${improves_line}" ]]; then
            echo "Release notes must contain a ## What This Improves section." >&2
            exit 1
          fi

          section_line() {
            local heading="$1"
            grep -n -m 1 "^## ${heading}$" "${notes_file}" | cut -d: -f1 || true
          }

          highlights_line="$(section_line "Highlights")"
          upgrade_notes_line="$(section_line "Upgrade Notes")"
          validation_line="$(section_line "Validation")"
          notes_line="$(section_line "Notes")"

          if [[ -z "${highlights_line}" || -z "${upgrade_notes_line}" || -z "${validation_line}" || -z "${notes_line}" ]]; then
            echo "Release notes must include ## Highlights, ## Upgrade Notes, ## Validation, and ## Notes sections." >&2
            exit 1
          fi

          if ! (( improves_line < highlights_line && highlights_line < upgrade_notes_line && upgrade_notes_line < validation_line && validation_line < notes_line )); then
            echo "Release note sections must appear in the expected order." >&2
            exit 1
          fi

          second_heading="$(grep -n -E '^#{1,6} ' "${notes_file}" | sed -n '2p')"
          if [[ -z "${second_heading}" ]]; then
            echo "Release notes must include an H2 subtitle after the H1 title." >&2
            exit 1
          fi

          second_heading_line="${second_heading%%:*}"
          second_heading_text="${second_heading#*:}"
          if [[ ! "${second_heading_text}" =~ ^##[[:space:]][^#[:space:]].* ]]; then
            echo "The second Markdown heading in release notes must be an H2 subtitle." >&2
            exit 1
          fi

          if [[ "${second_heading_text}" == "## What This Improves" || "${second_heading_line}" -ge "${improves_line}" ]]; then
            echo "Release notes must include an H2 subtitle before ## What This Improves." >&2
            exit 1
          fi

          notes_body_file="${RUNNER_TEMP}/release-notes-body-${tag}.md"
          tail -n +2 "${notes_file}" > "${notes_body_file}"

          {
            echo "tag=${tag}"
            echo "notes_file=${notes_file}"
            echo "notes_body_file=${notes_body_file}"
            echo "release_title=TypeScript WSDL Client ${tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        run: npm ci

      - name: Verify release state
        run: npm run ci

      - name: Package agent skill
        run: npm run skill:package -- ${{ steps.meta.outputs.tag }}

      - name: Create or update draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.release_title }}
          NOTES_BODY_FILE: ${{ steps.meta.outputs.notes_body_file }}
          SKILL_ASSET: dist/assets/typescript-wsdl-client-agent-skill-${{ steps.meta.outputs.tag }}.zip
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            is_draft="$(gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft')"
            if [[ "${is_draft}" != "true" ]]; then
              echo "Release ${TAG_NAME} already exists and is not a draft. Refusing to mutate a published release." >&2
              exit 1
            fi

            gh release edit "${TAG_NAME}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${NOTES_BODY_FILE}"
          else
            gh release create "${TAG_NAME}" \
              --draft \
              --title "${RELEASE_TITLE}" \
              --notes-file "${NOTES_BODY_FILE}"
          fi

          gh release upload "${TAG_NAME}" "${SKILL_ASSET}" --clobber
